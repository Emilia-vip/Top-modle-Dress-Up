services:
  mongodb:
    image: mongo:7
    container_name: basic-login-mongodb
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=Emilia
      - MONGO_INITDB_ROOT_PASSWORD=Emilia123
      - MONGO_INITDB_DATABASE=TopModel
    ports:
      - "25000:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
